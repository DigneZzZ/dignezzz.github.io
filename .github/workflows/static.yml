name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '.github/workflows/gen.yml'
      - '**/README.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  TZ: Europe/Moscow

jobs:
  generate-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git config
        run: |
          git config user.name "GitHub Action"
          git config user.email "dignezzz@gmail.com"

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint all .sh scripts
        continue-on-error: true
        run: |
          shopt -s globstar nullglob
          scripts=(./**/*.sh)
          if [[ ${#scripts[@]} -gt 0 ]]; then
            shellcheck --severity=warning "${scripts[@]}" || echo "::warning::ShellCheck found issues"
          fi

      - name: Generate README files
        run: |
          timestamp=$(date '+%Y-%m-%d %H:%M %Z')
          
          for dir in */; do
            [[ "$dir" =~ ^[._] ]] && continue

            mapfile -t scripts < <(find "$dir" -maxdepth 3 -type f -name "*.sh" | sort)
            [[ ${#scripts[@]} -eq 0 ]] && continue

            {
              echo "## Scripts in ${dir%/}"
              echo ""

              # Group by subdirectory
              prev_subdir=""
              for file in "${scripts[@]}"; do
                subdir=$(dirname "$file" | sed "s|^${dir}||" | sed 's|^/||')
                if [[ -n "$subdir" && "$subdir" != "." && "$subdir" != "${dir%/}" ]]; then
                  if [[ "$subdir" != "$prev_subdir" ]]; then
                    [[ -n "$prev_subdir" ]] && echo ""
                    echo "### ${subdir}"
                    echo ""
                    echo "| Script Name | Command |"
                    echo "|-------------|---------|"
                    prev_subdir="$subdir"
                  fi
                else
                  if [[ "$prev_subdir" != "_root_" ]]; then
                    echo "| Script Name | Command |"
                    echo "|-------------|---------|"
                    prev_subdir="_root_"
                  fi
                fi
                script_name=$(basename "$file")
                echo "| $script_name | \`bash <(wget -qO- https://dignezzz.github.io/$file)\` |"
              done
              echo ""
              echo "_Last updated at ${timestamp}_"
            } > "${dir}README.md"
          done
          
          {
            echo "# 🚀 Scripts Index"
            echo ""
            echo "![Build Status](https://github.com/${{ github.repository }}/actions/workflows/static.yml/badge.svg)"
            echo ""
            
            for dir in */; do
              [[ -f "${dir}README.md" ]] || continue
              echo "## ${dir%/}"
              echo ""
              cat "${dir}README.md"
              echo ""
            done
            
            cat << 'FOOTER'
          ---
          ## 📘 Additional Resources

          - 🌐 [openode.xyz](https://openode.xyz) — мой форум с закрытыми клубами и подпиской.
            - 🔒 Внутри — платные статьи и практические гайды по установке и настройке **Marzban** и **Remnawave**.

          - ✍️ [neonode.cc](https://neonode.cc) — блог с техническими заметками, статьями и руководствами.

          FOOTER
            echo "_Global README auto-generated at ${timestamp}_"
          } > README.md

      - name: Commit README changes
        run: |
          git add README.md */README.md
          if ! git diff --cached --quiet; then
            git commit -m "🔄 Auto-generate README files [skip ci]"
            git push
          fi

  deploy:
    needs: generate-readme
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull origin main || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          retention-days: 3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 10
